<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nairobi Sweets – Signup & Pay</title>

<style>
body { font-family: Arial; background:#0b0f2c; color:#fff; padding:20px; }
input, select, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; }
button { background:#ffd84b; font-weight:bold; cursor:pointer; }
.status { margin-top:10px; font-size:14px; }
</style>
</head>

<body>

<h2>Create Profile & Pay</h2>

<input id="name" placeholder="Display Name"/>
<input id="phone" placeholder="07XXXXXXXX"/>
<input id="location" placeholder="Nairobi"/>
<input id="age" type="number" placeholder="Age"/>
<select id="plan">
  <option value="featured">Featured</option>
  <option value="vip">VIP</option>
  <option value="vvip">VVIP</option>
</select>
<input id="amount" type="number" value="1"/>
<input id="slug" placeholder="slug"/>
<textarea id="bio" placeholder="Bio"></textarea>

<input id="imageFile" type="file"/>

<button onclick="createProfileAndPay()">Create profile + Pay now</button>

<div class="status" id="status"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://dkjlvyynvgtijccitvvd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_LtXESbvWOeL5EiUi1aYXSg_Ynm8qywm";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const STK_URL = "/.netlify/functions/mpesa-stk-push";

let uploadedImageUrl = null;

// 🔥 PHONE FIX
function normalizePhone(phone) {
  let p = phone.replace(/\D/g,'');
  if (p.startsWith('0')) p = '254' + p.slice(1);
  if (p.startsWith('7')) p = '254' + p;
  if (p.length !== 12) throw new Error("Invalid phone");
  return p;
}

// 🔥 IMAGE FIX (no base64 bug)
async function uploadImage(file) {
  const fileName = Date.now() + "-" + file.name;
  const path = `profiles/${fileName}`;

  const { error } = await supabase.storage
    .from("profile-images")
    .upload(path, file);

  if (error) throw error;

  const { data } = supabase.storage
    .from("profile-images")
    .getPublicUrl(path);

  return data.publicUrl;
}

// 🔥 SAVE PROFILE
async function saveProfile(data) {
  const { data: res, error } = await supabase
    .from("profiles")
    .insert(data)
    .select()
    .single();

  if (error) throw error;
  return res;
}

// 🔥 MAIN FLOW
window.createProfileAndPay = async () => {
  try {
    document.getElementById("status").innerText = "Processing...";

    const name = document.getElementById("name").value.trim();
    const phone = normalizePhone(document.getElementById("phone").value);
    const location = document.getElementById("location").value;
    const age = Number(document.getElementById("age").value);
    const plan = document.getElementById("plan").value;
    const amount = Number(document.getElementById("amount").value);
    const slug = document.getElementById("slug").value || name.toLowerCase();
    const bio = document.getElementById("bio").value;

    const file = document.getElementById("imageFile").files[0];

    if (!name || !phone) throw new Error("Missing required fields");

    // upload image FIRST
    if (file) {
      uploadedImageUrl = await uploadImage(file);
    }

    // save profile
    const profile = await saveProfile({
      name,
      phone,
      location,
      age,
      plan,
      slug,
      bio,
      image_url: uploadedImageUrl,
      payment_status: "pending",
      status: "draft"
    });

    // 🔥 STK CALL
    const res = await fetch(STK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        profile_id: profile.id,
        phone,
        amount,
        account_reference: slug,
        description: `Payment for ${name}`
      })
    });

    const json = await res.json();

    if (!res.ok) {
      throw new Error(json.error || "STK failed");
    }

    document.getElementById("status").innerText =
      "STK sent. Check your phone 📱";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "❌ " + err.message;
  }
};
</script>

</body>
</html>
